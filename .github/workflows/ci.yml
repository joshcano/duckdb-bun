name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch libduckdb (not committed)
        run: bun run fetch-lib

      - name: Lint (Biome)
        run: bunx biome ci src tests scripts examples

      - name: Test (unit + parity vs @duckdb/node-api + compile proof)
        run: bun test
